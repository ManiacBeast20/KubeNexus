<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KubeNexus API</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --accent-amber: #f59e0b;
      --accent-cyan: #06b6d4;
      --border-color: #e2e8f0;
      --glitch-shadow: 2px 2px 0px rgba(6, 182, 212, 0.4), -2px -2px 0px rgba(245, 158, 11, 0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg-color);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
      /* Subtle geometric background pattern */
      background-image: linear-gradient(var(--border-color) 1px, transparent 1px),
                        linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
      background-size: 40px 40px;
      background-position: center center;
    }

    /* Abstract shapes in the background */
    .bg-shape-1, .bg-shape-2 {
      position: fixed;
      z-index: -1;
      opacity: 0.4;
      pointer-events: none;
    }
    .bg-shape-1 {
      top: -100px; right: -100px;
      width: 400px; height: 400px;
      background: linear-gradient(135deg, transparent, var(--accent-cyan));
      clip-path: polygon(0 0, 100% 0, 100% 100%, 0 50%);
    }
    .bg-shape-2 {
      bottom: -100px; left: -100px;
      width: 500px; height: 300px;
      background: linear-gradient(135deg, transparent, var(--accent-amber));
      clip-path: polygon(25% 0%, 100% 0%, 75% 100%, 0% 100%);
    }

    .header {
      text-align: center;
      margin-bottom: 50px;
      position: relative;
    }

    .header img {
      width: 100px;
      height: 100px;
      object-fit: contain;
      margin-bottom: 20px;
      filter: drop-shadow(4px 4px 0px var(--accent-cyan));
      transition: all 0.3s ease;
    }

    .header h1 {
      font-size: 3rem;
      font-weight: 900;
      color: var(--text-main);
      letter-spacing: -1px;
      text-transform: uppercase;
      position: relative;
      display: inline-block;
    }

    /* Time Stutter Glitch Effect on Title Hover */
    .header h1:hover {
      animation: glitch 0.3s linear infinite;
      text-shadow: var(--glitch-shadow);
    }

    @keyframes glitch {
      0% { transform: translate(0) }
      20% { transform: translate(-2px, 2px) }
      40% { transform: translate(-2px, -2px) }
      60% { transform: translate(2px, 2px) }
      80% { transform: translate(2px, -2px) }
      100% { transform: translate(0) }
    }

    .header p {
      color: var(--text-muted);
      margin-top: 8px;
      font-size: 1.1rem;
      letter-spacing: 2px;
      font-weight: 600;
      text-transform: uppercase;
    }

    /* Cards with harsh shadows and sharp borders */
    .card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border: 2px solid var(--text-main);
      border-radius: 0px; /* Sharp corners */
      padding: 30px;
      width: 100%;
      max-width: 800px;
      margin-bottom: 24px;
      box-shadow: 8px 8px 0px 0px var(--text-main);
      position: relative;
      overflow: hidden;
    }

    /* Glitch line accent on top of cards */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent-amber), var(--accent-cyan));
    }

    .input-row {
      display: flex;
      gap: 16px;
      align-items: stretch;
      margin-top: 10px;
    }

    textarea {
      flex: 1;
      background: var(--bg-color);
      border: 2px solid var(--text-main);
      color: var(--text-main);
      padding: 16px;
      font-size: 1.05rem;
      resize: none;
      height: 100px;
      outline: none;
      font-family: 'Outfit', sans-serif;
      font-weight: 400;
      transition: all 0.2s;
      box-shadow: inset 2px 2px 0px rgba(0,0,0,0.05);
    }

    textarea:focus {
      border-color: var(--accent-cyan);
      box-shadow: 4px 4px 0px rgba(6, 182, 212, 0.3);
    }

    textarea::placeholder {
      color: #94a3b8;
    }

    .btn {
      padding: 14px 24px;
      border: 2px solid var(--text-main);
      cursor: pointer;
      font-size: 1rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.2s;
      background: var(--text-main);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-deploy {
      flex: 1;
      background: var(--text-main);
      color: #ffffff;
      position: relative;
    }

    .btn-deploy:hover:not(:disabled) {
      background: var(--accent-cyan);
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0px var(--text-main);
    }

    .btn-deploy:active:not(:disabled) {
      transform: translate(0px, 0px);
      box-shadow: 0px 0px 0px var(--text-main);
    }

    .btn-deploy:disabled {
      background: #cbd5e1;
      border-color: #cbd5e1;
      cursor: not-allowed;
    }

    .btn-mic {
      background: #ffffff;
      color: var(--text-main);
      font-size: 1.5rem;
      padding: 16px;
      height: 100%;
    }

    .btn-mic:hover:not(:disabled) {
      background: #f1f5f9;
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0px var(--text-main);
    }

    /* Listening state - Quantum Break Amber Flare */
    .btn-mic.listening {
      background: var(--accent-amber);
      color: #fff;
      border-color: var(--accent-amber);
      animation: stutterPulse 0.5s infinite;
      box-shadow: 0 0 15px var(--accent-amber);
    }

    @keyframes stutterPulse {
      0%, 100% { opacity: 1; transform: translate(0); }
      25% { transform: translate(-1px, 1px); }
      50% { opacity: 0.8; transform: translate(1px, -1px); }
      75% { transform: translate(-1px, -1px); }
    }

    .section-title {
      font-size: 0.85rem;
      font-weight: 800;
      color: var(--text-main);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 20px;
      border-left: 4px solid var(--accent-amber);
      padding-left: 10px;
    }

    .status-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-main);
      position: relative;
    }

    /* Corner sharp cutouts (polygon) */
    .status-item {
      clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
    }

    .status-item.created { border-left: 4px solid var(--accent-cyan); }
    .status-item.error { border-left: 4px solid #ef4444; }
    .status-item.loading { border-left: 4px solid var(--accent-amber); }

    .url-box {
      background: #f0fdf4;
      border: 2px solid #22c55e;
      padding: 24px;
      text-align: center;
      position: relative;
    }

    .url-box h3 {
      color: #166534;
      font-size: 1.3rem;
      margin-bottom: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .url-box code {
      color: #fff;
      font-size: 1.1rem;
      font-weight: bold;
      background: var(--text-main);
      padding: 10px 16px;
      display: inline-block;
      margin-top: 10px;
      border-radius: 4px;
      box-shadow: 4px 4px 0px rgba(34, 197, 94, 0.4);
    }

    .hidden { display: none !important; }

    /* Custom geometric loader */
    .loader {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--text-main);
      font-size: 1.1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 20px;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid var(--border-color);
      border-top-color: var(--accent-cyan);
      border-right-color: var(--accent-amber);
      animation: spinSharp 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
    }

    @keyframes spinSharp {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

  </style>
</head>
<body>

  <div class="bg-shape-1"></div>
  <div class="bg-shape-2"></div>

  <div class="header">
    <img src="logo.png" alt="KubeNexus Logo" onerror="this.style.display='none'"/>
    <h1>KubeNexus</h1>
    <p>Intelligent Kubernetes Automation</p>
  </div>

  <!-- Input Card -->
  <div class="card">
    <div class="section-title">Initiate Deployment</div>
    <div class="input-row">
      <textarea id="requestInput" placeholder='e.g. "Deploy nginx with 3 replicas and a postgres database"'></textarea>
      <div class="btn-controls">
        <button class="btn btn-mic" id="micBtn" title="Click to speak">🎤</button>
        <button class="btn btn-deploy" id="deployBtn">Execute</button>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div class="card hidden" id="loadingCard">
    <div class="loader">
      <div class="spinner"></div>
      <span id="loadingText">Processing your request...</span>
    </div>
  </div>

  <!-- Deployed Resources -->
  <div class="card hidden" id="resultsCard">
    <div class="section-title">Deployed Assets</div>
    <ul class="status-list" id="statusList"></ul>
  </div>

  <!-- URL -->
  <div class="card hidden" id="urlCard">
    <div class="url-box">
      <h3>🎉 Deployment Secure</h3>
      <p style="color:#15803d;font-size:0.95rem;font-weight:600;">Run this command to access the endpoint:</p>
      <code id="accessCommand"></code>
    </div>
  </div>

  <!-- AI Watch Log -->
  <div class="card hidden" id="watchCard">
    <div class="section-title">Chronon AI Monitor</div>
    <ul class="status-list" id="watchList"></ul>
  </div>

  <script>
    const BACKEND = '/api';
    const deployBtn = document.getElementById('deployBtn');
    const micBtn = document.getElementById('micBtn');
    const requestInput = document.getElementById('requestInput');
    const loadingCard = document.getElementById('loadingCard');
    const loadingText = document.getElementById('loadingText');
    const resultsCard = document.getElementById('resultsCard');
    const statusList = document.getElementById('statusList');
    const urlCard = document.getElementById('urlCard');
    const accessCommand = document.getElementById('accessCommand');
    const watchCard = document.getElementById('watchCard');
    const watchList = document.getElementById('watchList');

    // Voice Recognition
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      const recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = false;

      micBtn.addEventListener('click', () => {
        micBtn.classList.add('listening');
        micBtn.textContent = 'REC';
        recognition.start();
      });

      recognition.onresult = (e) => {
        requestInput.value = e.results[0][0].transcript;
        micBtn.classList.remove('listening');
        micBtn.textContent = '🎤';
      };

      recognition.onerror = () => {
        micBtn.classList.remove('listening');
        micBtn.textContent = '🎤';
      };

      recognition.onend = () => {
        micBtn.classList.remove('listening');
        micBtn.textContent = '🎤';
      };
    } else {
      micBtn.disabled = true;
      micBtn.title = 'Voice not supported. Use Chrome or Edge.';
    }

    // Poll watch status
    async function pollWatchStatus(watchId) {
      watchCard.classList.remove('hidden');
      watchList.innerHTML = '<li class="status-item loading">🔍 AI temporal monitoring active...</li>';

      const interval = setInterval(async () => {
        try {
          const res = await fetch(`${BACKEND}/watch/${watchId}`);
          const data = await res.json();

          watchList.innerHTML = '';

          if (data.events && data.events.length > 0) {
            data.events.forEach(event => {
              const li = document.createElement('li');
              const isError = event.type === 'error_detected';
              const isFix = event.type === 'fix_applied';
              const isSuccess = event.type === 'success';
              li.className = `status-item ${isError ? 'error' : isSuccess || isFix ? 'created' : 'loading'}`;
              li.innerHTML = `<span>${event.message}</span>`;
              watchList.appendChild(li);
            });
          } else {
            watchList.innerHTML = '<li class="status-item loading">🔍 AI temporal monitoring active...</li>';
          }

          if (data.status === 'complete' || data.status === 'timeout') {
            clearInterval(interval);
            if (data.status === 'timeout') {
              const li = document.createElement('li');
              li.className = 'status-item error';
              li.innerHTML = '<span>⏱️ Temporal connection lost (timeout after 2 minutes)</span>';
              watchList.appendChild(li);
            }
          }
        } catch (err) {
          clearInterval(interval);
        }
      }, 5000);
    }

    // Deploy
    deployBtn.addEventListener('click', async () => {
      const request = requestInput.value.trim();
      if (!request) return;

      loadingCard.classList.remove('hidden');
      resultsCard.classList.add('hidden');
      urlCard.classList.add('hidden');
      watchCard.classList.add('hidden');
      statusList.innerHTML = '';
      watchList.innerHTML = '';
      loadingText.textContent = 'Extracting intent vectors...';
      deployBtn.disabled = true;

      try {
        loadingText.textContent = 'Materializing resources...';

        const res = await fetch(`${BACKEND}/deploy`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ request })
        });

        const data = await res.json();
        loadingCard.classList.add('hidden');

        if (data.error) {
          statusList.innerHTML = `<li class="status-item error">❌ ${data.error}</li>`;
          resultsCard.classList.remove('hidden');
          return;
        }

        resultsCard.classList.remove('hidden');
        data.deployed.forEach(item => {
          const li = document.createElement('li');
          const isCreated = item.status === 'created';
          li.className = `status-item ${isCreated ? 'created' : 'error'}`;
          li.innerHTML = `
            <span>${isCreated ? '✅' : '❌'}</span>
            <span><strong>${item.kind}</strong> — ${item.name}</span>
            <span style="margin-left:auto;color:${isCreated ? 'var(--accent-cyan)' : '#ef4444'}">${isCreated ? 'Materialized' : 'Failed'}</span>
          `;
          statusList.appendChild(li);
        });

        const appName = data.intent?.app_name;
        if (appName) {
          urlCard.classList.remove('hidden');
          accessCommand.textContent = `minikube service ${appName}-service --url`;
        }

        if (data.watch_id) {
          pollWatchStatus(data.watch_id);
        }

      } catch (err) {
        loadingCard.classList.add('hidden');
        statusList.innerHTML = `<li class="status-item error">❌ Chronon linkage failed (Backend unreachable)</li>`;
        resultsCard.classList.remove('hidden');
      } finally {
        deployBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
